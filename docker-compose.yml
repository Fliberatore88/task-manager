services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: file:/app/data/data.db
      PORT: "3001"
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      NODE_ENV: production
    volumes:
      - db-data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3001/api/tasks/stats',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        API_URL: http://api:3001
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      # Internal Docker network URL — the web container proxies /api/* to the api service.
      # No need to change this; access from any device on the network just works.
      API_URL: http://api:3001
    depends_on:
      api:
        condition: service_healthy

volumes:
  db-data:
